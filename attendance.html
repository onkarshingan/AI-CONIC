<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Take Attendance – AttendAI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="page-attendance">

  <nav class="navbar">
    <div class="nav-brand"><span class="brand-icon">⬡</span><span class="brand-text">AttendAI</span></div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/register">Register</a></li>
      <li><a href="/attendance" class="active">Attendance</a></li>
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/settings">Settings</a></li>
    </ul>
  </nav>

  <main class="page-main">
    <div class="page-header">
      <h1>Take <span class="accent-text">Attendance</span></h1>
      <p>AI face recognition marks attendance automatically in real-time.</p>
    </div>

    <div class="attendance-layout">

      <!-- ── CAMERA PANEL ───────────────────────────────────────── -->
      <div class="att-cam-panel">

        <div class="controls-row">
          <div class="form-group inline">
            <label>Select Course</label>
            <select id="courseSelect"></select>
          </div>
          <button class="btn btn-primary" id="startBtn">▶ Start</button>
          <button class="btn btn-danger"  id="stopBtn" disabled>■ Stop</button>
        </div>

        <div class="cam-frame large">
          <video id="attWebcam" autoplay playsinline muted></video>
          <canvas id="attCanvas" style="display:none"></canvas>
          <div class="cam-overlay">
            <div class="scan-line" id="scanLine"></div>
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>
          </div>
          <div class="recognition-badge" id="recognitionBadge"></div>
        </div>

        <!-- Anti-cheat: face must be visible for 3 s -->
        <div class="presence-bar-wrap">
          <label>Face Presence Timer (3 s required)</label>
          <div class="presence-bar">
            <div class="presence-fill" id="presenceFill"></div>
          </div>
          <span id="presenceText">0.0 s</span>
        </div>

        <div id="scanStatus" class="scan-status">Camera stopped.</div>
      </div>

      <!-- ── LOG PANEL ──────────────────────────────────────────── -->
      <div class="att-log-panel">
        <div class="log-header">
          <h2>Attendance Log</h2>
          <a href="/api/download_excel" class="btn btn-ghost small">⬇ Download Excel</a>
        </div>

        <div class="log-filter-row">
          <select id="logCourseFilter" onchange="loadLog()"></select>
          <button class="btn btn-ghost small" onclick="loadLog()">🔄 Refresh</button>
        </div>

        <div class="log-table-wrap">
          <table class="log-table">
            <thead>
              <tr><th>ID</th><th>Name</th><th>Date</th><th>Time</th><th>Status</th></tr>
            </thead>
            <tbody id="logBody"></tbody>
          </table>
        </div>

        <!-- Manual absent marking -->
        <div class="manual-absent-card">
          <h3>Mark Absent Manually</h3>
          <div class="controls-row">
            <input type="text" id="absentId" placeholder="Student ID" style="flex:1"/>
            <select id="absentCourse" style="flex:1"></select>
            <button class="btn btn-danger small" onclick="markAbsent()">Mark Absent</button>
          </div>
          <div id="absentMsg" class="reg-message"></div>
        </div>
      </div>

    </div>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <script>
  let scanning     = false;
  let scanInterval = null;
  let presenceTimer = 0;
  let presenceInterval = null;
  let faceDetected  = false;

  window.addEventListener("DOMContentLoaded", async () => {
    await loadCourseSelects();
    await loadLog();
    await startCamera();
  });

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      document.getElementById("attWebcam").srcObject = stream;
    } catch {
      document.getElementById("scanStatus").textContent = "Camera access denied.";
    }
  }

  async function loadCourseSelects() {
    const res     = await fetch("/api/courses");
    const courses = await res.json();
    ["courseSelect","logCourseFilter","absentCourse"].forEach(id => {
      const sel = document.getElementById(id);
      sel.innerHTML = courses.map(c => `<option value="${c}">${c}</option>`).join("");
    });
  }

  async function loadLog() {
    const course = document.getElementById("logCourseFilter").value;
    const res    = await fetch(`/api/attendance?course=${course}`);
    const rows   = await res.json();
    const tbody  = document.getElementById("logBody");
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--muted)">No records yet.</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>${r.Student_ID}</td>
        <td>${r.Name}</td>
        <td>${r.Date}</td>
        <td>${r.Time}</td>
        <td><span class="status-badge ${r.Status.toLowerCase()}">${r.Status}</span></td>
      </tr>`).join("");
  }

  // ── Scanning ───────────────────────────────────────────────────────────────
  document.getElementById("startBtn").addEventListener("click", () => {
    if (scanning) return;
    scanning = true;
    document.getElementById("startBtn").disabled = true;
    document.getElementById("stopBtn").disabled  = false;
    document.getElementById("scanStatus").textContent = "🔍 Scanning for faces…";
    document.getElementById("scanLine").style.display = "block";
    presenceTimer = 0;

    scanInterval = setInterval(scanFrame, 1500);
  });

  document.getElementById("stopBtn").addEventListener("click", () => {
    scanning = false;
    clearInterval(scanInterval);
    clearInterval(presenceInterval);
    document.getElementById("startBtn").disabled = false;
    document.getElementById("stopBtn").disabled  = true;
    document.getElementById("scanStatus").textContent = "⏸ Scanning stopped.";
    document.getElementById("scanLine").style.display = "none";
    document.getElementById("recognitionBadge").textContent = "";
    resetPresence();
    loadLog();
  });

  async function scanFrame() {
    const video  = document.getElementById("attWebcam");
    const canvas = document.getElementById("attCanvas");
    canvas.width  = video.videoWidth  || 320;
    canvas.height = video.videoHeight || 240;
    canvas.getContext("2d").drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL("image/jpeg", 0.8);
    const course  = document.getElementById("courseSelect").value;

    // Presence timer: wait 3 s of continuous face detection
    presenceTimer = Math.min(presenceTimer + 1.5, 3);
    updatePresenceBar(presenceTimer);

    if (presenceTimer < 3) {
      document.getElementById("scanStatus").textContent =
        `⏳ Hold still… ${presenceTimer.toFixed(1)} / 3.0 s`;
      return;
    }

    try {
      const res  = await fetch("/api/recognize", {
        method : "POST",
        headers: { "Content-Type": "application/json" },
        body   : JSON.stringify({ image: dataUrl, course })
      });
      const data = await res.json();

      if (data.recognised && data.recognised.length) {
        data.recognised.forEach(r => {
          document.getElementById("recognitionBadge").textContent =
            `✅ ${r.name} – ${r.status}`;
          document.getElementById("scanStatus").textContent =
            `✅ Recognised: ${r.name} (${course})`;
        });
        presenceTimer = 0;
        updatePresenceBar(0);
      } else {
        document.getElementById("recognitionBadge").textContent = "❓ Unknown face";
        document.getElementById("scanStatus").textContent = "❓ Face not recognised.";
        presenceTimer = 0;
        updatePresenceBar(0);
      }
      loadLog();
    } catch (e) {
      document.getElementById("scanStatus").textContent = "⚠ Server error – retrying…";
    }
  }

  function updatePresenceBar(val) {
    const pct = (val / 3) * 100;
    document.getElementById("presenceFill").style.width = pct + "%";
    document.getElementById("presenceText").textContent = val.toFixed(1) + " s";
  }

  function resetPresence() {
    presenceTimer = 0;
    updatePresenceBar(0);
  }

  // ── Mark absent manually ───────────────────────────────────────────────────
  async function markAbsent() {
    const sid    = document.getElementById("absentId").value.trim();
    const course = document.getElementById("absentCourse").value;
    if (!sid) { showAbsentMsg("Enter Student ID.", "error"); return; }

    const res  = await fetch("/api/mark_absent", {
      method : "POST",
      headers: { "Content-Type": "application/json" },
      body   : JSON.stringify({ student_id: sid, course })
    });
    const data = await res.json();
    showAbsentMsg(data.success ? "✅ " + data.message : "❌ " + data.message,
                  data.success ? "success" : "error");
    if (data.success) loadLog();
  }

  function showAbsentMsg(text, type) {
    const el = document.getElementById("absentMsg");
    el.textContent = text;
    el.className   = `reg-message ${type}`;
    setTimeout(() => { el.textContent = ""; el.className = "reg-message"; }, 5000);
  }
  </script>
</body>
</html>
