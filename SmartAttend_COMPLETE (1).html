  DEF_STUDENTS.forEach(st=>{
    for(let d=30;d>=1;d--){
      const dt=new Date(now);dt.setDate(now.getDate()-d);
      if([0,6].includes(dt.getDay()))continue;
      const ds=dt.toISOString().slice(0,10);
      /* vary attendance rates per student for realistic data */
      const lowIds=[3,9,19,24,29,34,39];
      const midIds=[5,14,23,30,35];
      const ch=lowIds.includes(st.id)?0.50:midIds.includes(st.id)?0.67:0.85;
      st.subjects.forEach(sid=>{
        log.push({date:ds,studentId:st.id,subjectId:sid,present:Math.random()<ch,method:"manual"});
      });
    }
  });
  return log;
}

/* ── AUTH BACKEND — pure functions, fully synchronous ── */
function authLogin(emailInput, passInput, profsList){
  try{
    if(!emailInput||!passInput)return{ok:false,msg:"Please enter both email and password."};
    const email=emailInput.trim().toLowerCase();
    const found=profsList.find(p=>p&&p.email&&p.email.trim().toLowerCase()===email);
    if(!found)return{ok:false,msg:"No account found with that email address."};
    if(found.password!==passInput.trim())return{ok:false,msg:"Incorrect password. Please try again."};
    return{ok:true,prof:{...found}};
  }catch(e){
    return{ok:false,msg:"Login error. Please try again."};
  }
}
function authRegister(name,email,pass,dept,role,profsList){
  try{
    if(!name||!email||!pass)return{ok:false,msg:"Name, email and password are all required."};
    if(pass.length<6)return{ok:false,msg:"Password must be at least 6 characters."};
    const norm=email.trim().toLowerCase();
    if(profsList.find(p=>p&&p.email&&p.email.trim().toLowerCase()===norm))
      return{ok:false,msg:"An account with this email already exists."};
    const np={
      id:Date.now(),
      name:name.trim(),
      email:email.trim(),
      password:pass,
      role:role||"Professor",
      dept:dept||"Computer Science",
      avatar:name.trim().split(" ").map(w=>w[0]||"").join("").slice(0,2).toUpperCase()||"PR"
    };
    return{ok:true,prof:np};
  }catch(e){
    return{ok:false,msg:"Registration error. Please try again."};
  }
}

      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,

Spoof clues: flat 2D, screen glow, paper edges, moire, glossy, bezels, backlight, halftone, hands holding.
JSON only: {"live":true/false,"confidence":0-100,"reason":"brief","spoof_type":"none/printed_photo/screen/paper/card/other","warning":"msg"}`}
        ]}]})});
    const d=await r.json();

async function apiInsight(students,log){
  try{
    const stats=students.map(s=>({name:s.name,pct:calcOverall(s.id,s.subjects,log),batch:s.batch}));
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},

        messages:[{role:"user",content:`Attendance data analysis. Give exactly 3 bullet insights (emoji + max 18 words each):\n${JSON.stringify(stats)}`}]})});
    const d=await r.json();return d.content?.find(b=>b.type==="text")?.text||"";
  }catch{return"• Could not load AI insights. Check network connection.";}}

async function apiGmail(st,pct,bd){
  try{
    const lines=bd.map(s=>`• ${s.name} (${s.code}): ${s.pct}% — ${s.attended}/${s.held}`).join("\n");
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,
        mcp_servers:[{type:"url",url:"https://gmail.mcp.claude.com/mcp",name:"gmail"}],
        messages:[{role:"user",content:`Send email via Gmail to ${st.parentEmail}.\nSubject: ⚠️ Low Attendance Alert — ${st.name} (${st.roll})\nBody:\nDear Parent/Guardian,\n\nMIT Vishwaprayag Smart Attendance System Alert.\n\nStudent: ${st.name} | Roll: ${st.roll} | Class: ${st.cls} | ${st.batch}\nOverall Attendance: ${pct}% (Required: 75%)\n\n${lines}\n\nPlease contact MIT Vishwaprayag immediately.\n\nRegards, SmartAttend AI`}]})});
    const d=await r.json();return{ok:true,sim:!d.content?.some(b=>b.type==="mcp_tool_use"||b.type==="tool_use")};
  }catch{return{ok:false,sim:true};}}

/* ── HELPERS ── */
const todayStr=()=>new Date().toISOString().slice(0,10);
const ini=n=>n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
const pctCol=p=>p>=75?"#00f5c3":p>=60?"#f5a623":"#ff4d6d";
const pctBdg=p=>p>=75?{t:"Good",c:"ok"}:p>=60?{t:"Warning",c:"warn"}:{t:"Critical",c:"crit"};
function calcSub(sid,subId,log){
  const r=log.filter(x=>x.studentId===sid&&x.subjectId===subId);
  if(!r.length)return{pct:100,held:0,attended:0};
  const held=r.length,attended=r.filter(x=>x.present).length;
  return{pct:Math.round(attended/held*100),held,attended};}
function calcOverall(sid,subs,log){
  if(!subs.length)return 100;
  const a=subs.map(s=>calcSub(sid,s,log));
  return Math.round(a.reduce((x,y)=>x+y.pct,0)/a.length);}
function calc15Days(sid,log){
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-15);
  const cutStr=cutoff.toISOString().slice(0,10);
  const recent=log.filter(r=>r.studentId===sid&&r.date>cutStr);
  const days=new Set(recent.map(r=>r.date));
  const pDays=new Set(recent.filter(r=>r.present).map(r=>r.date));
  return{total:days.size,present:pDays.size,pct:days.size?Math.round(pDays.size/days.size*100):0};}

const BS2={ok:{bg:"rgba(0,245,195,.12)",c:"#00f5c3",b:"rgba(0,245,195,.3)"},warn:{bg:"rgba(245,166,35,.12)",c:"#f5a623",b:"rgba(245,166,35,.3)"},crit:{bg:"rgba(255,77,109,.12)",c:"#ff4d6d",b:"rgba(255,77,109,.3)"}};

/* ── FACE SCANNER ── */
function FaceScanner({student,subjectId,onClose,onSuccess}){
  const{dark}=useTheme();
  const[st,setSt]=useState("idle");
  const[prog,setProg]=useState(0);
  const[checks,setChecks]=useState([]);
  const[res,setRes]=useState(null);
  const vRef=useRef(null),cRef=useRef(null),sRef=useRef(null);
  useEffect(()=>{
    (async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:640,height:480}});sRef.current=s;if(vRef.current)vRef.current.srcObject=s;}catch{alert("Camera access denied. Please allow camera permissions.");onClose();}})();
    return()=>{if(sRef.current)sRef.current.getTracks().forEach(t=>t.stop());};
  },[]);
  function capture(){const v=vRef.current,c=cRef.current;if(!v||!c)return null;c.width=v.videoWidth||640;c.height=v.videoHeight||480;c.getContext("2d").drawImage(v,0,0);return c.toDataURL("image/jpeg",.85).split(",")[1];}
  async function scan(){
    setSt("scanning");setProg(0);setChecks([]);setRes(null);
    const done=[];
    for(let i=0;i<3;i++){
      await new Promise(r=>setTimeout(r,1000));setProg((i+1)/3*55);setSt("analyzing");
      const fr=capture();if(!fr){setSt("fail");return;}
      const r=await apiLiveness(fr);done.push(r);setChecks([...done]);setProg(55+(i+1)/3*40);
      if(!r.live&&r.confidence>62){setSt("spoof");setRes(r);if(sRef.current)sRef.current.getTracks().forEach(t=>t.stop());return;}}
    setProg(100);
    const lc=done.filter(c=>c.live).length,ac=Math.round(done.reduce((a,c)=>a+c.confidence,0)/done.length),sp=done.find(c=>!c.live&&c.confidence>55);
    if(sp){setSt("spoof");setRes(sp);if(sRef.current)sRef.current.getTracks().forEach(t=>t.stop());}
    else if(lc>=2){setSt("done");setRes({live:true,confidence:ac,reason:"Live face verified ✓",warning:""});if(sRef.current)sRef.current.getTracks().forEach(t=>t.stop());onSuccess();}
    else{setSt("fail");setRes({live:false,confidence:ac,reason:"Face unclear. Retry.",warning:"Ensure good lighting and face camera directly."});}}
  const bg=dark?"#060b14":"#f8fafc",brd=dark?"#1e293b":"#e2e8f0";
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(8px)"}}>
    <div style={{background:bg,border:`1px solid ${brd}`,borderRadius:18,padding:"24px",width:520,maxWidth:"96vw",maxHeight:"96vh",overflowY:"auto",animation:"scaleIn .2s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:17,color:"#00f5c3"}}>🔬 Face Liveness Scanner</span>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#475569",fontSize:20,cursor:"pointer"}}>✕</button>
      </div>
      {student&&<div style={{fontSize:12,color:"#475569",marginBottom:14}}>Student: <b style={{color:"#00f5c3"}}>{student.name}</b> · {student.roll} · <b style={{color:student.batch==="Batch 1"?"#00f5c3":"#38bdf8"}}>{student.batch}</b></div>}
      <div style={{position:"relative",borderRadius:12,overflow:"hidden",background:"#000",aspectRatio:"4/3",marginBottom:14}}>
        <video ref={vRef} autoPlay playsInline muted style={{width:"100%",height:"100%",objectFit:"cover",display:"block",transform:"scaleX(-1)"}}/>
        <canvas ref={cRef} style={{display:"none"}}/>
        {(st==="scanning"||st==="analyzing")&&<div style={{position:"absolute",inset:0,zIndex:10,pointerEvents:"none"}}>
          <div style={{position:"absolute",left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#00f5c3,transparent)",animation:"scanLine 1.4s linear infinite"}}/>
          {[[{top:"10px",left:"10px"},{borderTop:"3px solid #00f5c3",borderLeft:"3px solid #00f5c3",borderRadius:"4px 0 0 0"}],
            [{top:"10px",right:"10px"},{borderTop:"3px solid #00f5c3",borderRight:"3px solid #00f5c3",borderRadius:"0 4px 0 0"}],
            [{bottom:"10px",left:"10px"},{borderBottom:"3px solid #00f5c3",borderLeft:"3px solid #00f5c3",borderRadius:"0 0 0 4px"}],
            [{bottom:"10px",right:"10px"},{borderBottom:"3px solid #00f5c3",borderRight:"3px solid #00f5c3",borderRadius:"0 0 4px 0"}]
          ].map(([pos,b],i)=><div key={i} style={{position:"absolute",width:26,height:26,...pos,...b}}/>)}
        </div>}
        {st==="done"&&<div style={{position:"absolute",inset:0,background:"rgba(0,245,195,.12)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,color:"#00f5c3",fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:22}}><span style={{fontSize:52}}>✅</span>VERIFIED</div>}
        {st==="spoof"&&<div style={{position:"absolute",inset:0,background:"rgba(255,77,109,.15)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,color:"#ff4d6d",fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:20}}><span style={{fontSize:52}}>🚫</span>FRAUD DETECTED</div>}
        {st==="fail"&&<div style={{position:"absolute",inset:0,background:"rgba(245,166,35,.1)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,color:"#f5a623",fontFamily:"Syne,sans-serif",fontWeight:800}}><span style={{fontSize:44}}>⚠️</span>SCAN FAILED</div>}
      </div>
      {(st==="scanning"||st==="analyzing")&&<div style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#475569",marginBottom:4}}><span>{st==="analyzing"?"🧠 AI analyzing frame…":"📷 Capturing…"}</span><span>{Math.round(prog)}%</span></div>
        <div style={{height:5,background:"rgba(128,128,128,.2)",borderRadius:10,overflow:"hidden"}}><div style={{width:`${prog}%`,height:"100%",background:"linear-gradient(90deg,#00f5c3,#38bdf8)",borderRadius:10,transition:"width .3s"}}/></div>
      </div>}
      {checks.length>0&&<div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>{checks.map((c,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:8,fontSize:12,fontWeight:600,background:c.live?"rgba(0,245,195,.07)":"rgba(255,77,109,.07)",color:c.live?"#00f5c3":"#ff4d6d",border:`1px solid ${c.live?"rgba(0,245,195,.2)":"rgba(255,77,109,.2)"}`}}><span>{c.live?"✅":"🚫"}</span><span>Check {i+1}: {c.live?"Live face detected":c.spoof_type?.replace(/_/g," ")||"Spoof"}</span><span style={{marginLeft:"auto",fontWeight:800}}>{c.confidence}%</span></div>)}</div>}
      {res&&(st==="done"||st==="spoof"||st==="fail")&&<div style={{padding:"12px 16px",borderRadius:10,marginBottom:12,background:st==="done"?"rgba(0,245,195,.06)":"rgba(255,77,109,.06)",border:`1px solid ${st==="done"?"rgba(0,245,195,.3)":"rgba(255,77,109,.3)"}`,color:st==="done"?"#00f5c3":"#ff4d6d"}}>
        <div style={{fontWeight:700}}>{res.reason}</div>{res.warning&&<div style={{fontSize:12,marginTop:4,opacity:.8}}>{res.warning}</div>}
        {st==="spoof"&&<div style={{marginTop:6,fontSize:13,fontWeight:800}}>⛔ Type: {res.spoof_type?.replace(/_/g," ").toUpperCase()}</div>}
      </div>}
      <div style={{display:"flex",gap:8}}>
        {(st==="idle"||st==="fail")&&<button onClick={scan} style={{flex:1,background:"rgba(0,245,195,.1)",color:"#00f5c3",border:"1px solid rgba(0,245,195,.3)",padding:"11px 0",borderRadius:10,cursor:"pointer",fontFamily:"Syne,sans-serif",fontSize:14,fontWeight:800}}>{st==="fail"?"🔄 Retry":"🔬 Start Liveness Scan"}</button>}
        {st==="done"&&<button onClick={onClose} style={{flex:1,background:"rgba(0,245,195,.1)",color:"#00f5c3",border:"1px solid rgba(0,245,195,.3)",padding:"11px 0",borderRadius:10,cursor:"pointer",fontFamily:"Syne,sans-serif",fontSize:14,fontWeight:800}}>✓ Done — Close</button>}
        {st==="spoof"&&<button onClick={onClose} style={{flex:1,background:"rgba(255,77,109,.1)",color:"#ff4d6d",border:"1px solid rgba(255,77,109,.3)",padding:"11px 0",borderRadius:10,cursor:"pointer",fontFamily:"Syne,sans-serif",fontSize:14,fontWeight:800}}>Close — Fraud Logged</button>}
        <button onClick={onClose} style={{background:"transparent",color:"#475569",border:`1px solid ${brd}`,padding:"11px 18px",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:600}}>Cancel</button>
      </div>
    </div>
  </div>;}

/* ── LEADERBOARD ── */
function Leaderboard({students,log}){
  const{dark}=useTheme();
  const[fb,setFb]=useState("All");
  const[fc,setFc]=useState("All");
  const[view,setView]=useState("overall"); // "overall"|"byclass"
  const muted=dark?"#475569":"#94a3b8";
  const cardBg=dark?"#080d18":"#fff";
  const brd=dark?"#0d1929":"#e2e8f0";
  const classes=useMemo(()=>[...new Set(students.map(s=>s.cls))].sort(),[students]);

  // build ranked list
  const ranked=useMemo(()=>students
    .filter(s=>(fb==="All"||s.batch===fb)&&(fc==="All"||s.cls===fc))
    .map(s=>{const d=calc15Days(s.id,log);const ov=calcOverall(s.id,s.subjects,log);return{...s,d15:d,overall:ov,score:d.present*10+d.pct};})
    .sort((a,b)=>b.score-a.score).map((s,i)=>({...s,rank:i+1}))
  ,[students,log,fb,fc]);

  // class-wise rankings: each student gets a rank within their class
  const classRanked=useMemo(()=>{
    const all=students.map(s=>{const d=calc15Days(s.id,log);const ov=calcOverall(s.id,s.subjects,log);return{...s,d15:d,overall:ov,score:d.present*10+d.pct};});
    const byClass={};
    classes.forEach(cls=>{
      const inClass=all.filter(s=>s.cls===cls).sort((a,b)=>b.score-a.score).map((s,i)=>({...s,classRank:i+1,classTotalStudents:0}));
      inClass.forEach(s=>s.classTotalStudents=inClass.length);
      byClass[cls]=inClass;
    });
    return byClass;
  },[students,log,classes]);

  // get last 15 weekdays for calendar strip
  const last15Dates=useMemo(()=>{
    const dates=[]; const now=new Date();
    for(let d=30;d>=0&&dates.length<15;d--){
      const dt=new Date(now); dt.setDate(now.getDate()-d);
      if(![0,6].includes(dt.getDay())) dates.push(dt.toISOString().slice(0,10));
    }
    return dates;
  },[]);

  const medals=["🥇","🥈","🥉"];
  const podClr=["#ffd700","#c0c0c0","#cd7f32"];
  const podH=["160px","120px","90px"];
  const podOrder=[1,0,2];
  const top3=ranked.slice(0,3);

  return <div style={{animation:"fadeUp .3s ease"}}>
    {/* HEADER */}
    <div style={{marginBottom:20}}>
      <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:26,display:"flex",alignItems:"center",gap:10}}>
        🏆 Attendance Competition
        <span style={{background:"linear-gradient(135deg,#ffd700,#ffb300)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontSize:22}}>Rankings</span>
      </div>
      <div style={{fontSize:13,color:muted,marginTop:3}}>Last 15 school days · Class-wise & overall rankings · MIT Vishwaprayag</div>
    </div>

    {/* STAT CARDS */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
      {[
        {l:"Competing",v:ranked.length,c:"#00f5c3",ico:"🏆",sub:"total students"},
        {l:"Top Score",v:ranked[0]?`${ranked[0].score}pts`:"—",c:"#ffd700",ico:"⭐",sub:ranked[0]?.name.split(" ")[0]||"—"},
        {l:"Perfect 15d",v:ranked.filter(s=>s.d15.pct===100).length,c:"#a78bfa",ico:"✨",sub:"100% attendance"},
        {l:"Need Attention",v:ranked.filter(s=>s.d15.pct<75).length,c:"#ff4d6d",ico:"⚠️",sub:"below 75% (15d)"},
      ].map(s=>(
        <div key={s.l} style={{background:cardBg,border:`1px solid ${brd}`,borderRadius:13,padding:"16px",position:"relative",overflow:"hidden",boxShadow:dark?"none":"0 1px 6px rgba(0,0,0,.05)"}}>
          <div style={{position:"absolute",inset:0,background:`radial-gradient(circle at 80% 20%,${s.c}14,transparent 65%)`}}/>
          <div style={{fontSize:22,marginBottom:5}}>{s.ico}</div>
          <div style={{fontFamily:"Syne,sans-serif",fontSize:24,fontWeight:800,color:s.c,lineHeight:1}}>{s.v}</div>
          <div style={{fontSize:11,color:muted,marginTop:3}}>{s.l}</div>
          <div style={{fontSize:10,color:dark?"#1e3a5f":"#cbd5e1",marginTop:1}}>{s.sub}</div>
          <div style={{position:"absolute",bottom:0,left:0,height:2,width:"100%",background:`linear-gradient(90deg,${s.c},transparent)`}}/>
        </div>
      ))}
    </div>

    {/* FILTERS + VIEW TOGGLE */}
    <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
      <div style={{display:"flex",gap:4,background:dark?"rgba(255,255,255,.04)":"rgba(0,0,0,.04)",borderRadius:10,padding:3,border:`1px solid ${brd}`}}>
        {["overall","byclass"].map(v=><button key={v} onClick={()=>setView(v)} style={{padding:"6px 14px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",transition:"all .2s",...(view===v?{background:dark?"#080d18":"#fff",color:"#00f5c3",boxShadow:"0 1px 4px rgba(0,0,0,.15)"}:{background:"transparent",color:muted})}}>
          {v==="overall"?"🌐 Overall Rankings":"🏫 Class Rankings"}
        </button>)}
      </div>
      <div style={{width:1,height:22,background:dark?"rgba(255,255,255,.08)":"#e2e8f0"}}/>
      {["All","Batch 1","Batch 2"].map(b=><button key={b} onClick={()=>setFb(b)} style={{padding:"6px 14px",borderRadius:20,border:`1px solid ${fb===b?"#00f5c3":"rgba(128,128,128,.2)"}`,background:fb===b?"rgba(0,245,195,.1)":"transparent",color:fb===b?"#00f5c3":muted,cursor:"pointer",fontSize:12,fontWeight:700,transition:"all .15s"}}>{b}</button>)}
      <div style={{width:1,height:22,background:dark?"rgba(255,255,255,.08)":"#e2e8f0"}}/>
      {["All",...classes].map(c=><button key={c} onClick={()=>setFc(c)} style={{padding:"6px 14px",borderRadius:20,border:`1px solid ${fc===c?"#38bdf8":"rgba(128,128,128,.2)"}`,background:fc===c?"rgba(56,189,248,.1)":"transparent",color:fc===c?"#38bdf8":muted,cursor:"pointer",fontSize:12,fontWeight:700,transition:"all .15s"}}>{c}</button>)}
      <span style={{marginLeft:"auto",fontSize:11,color:muted}}>{ranked.length} students</span>
    </div>

    {/* ═══ OVERALL VIEW ═══ */}
    {view==="overall"&&<>
      {/* PODIUM */}
      {top3.length>0&&<div style={{background:cardBg,border:`1px solid ${brd}`,borderRadius:16,padding:"22px 20px 0",marginBottom:20,overflow:"hidden",position:"relative",boxShadow:dark?"none":"0 2px 12px rgba(0,0,0,.06)"}}>
        <div style={{position:"absolute",inset:0,background:dark?"radial-gradient(circle at 50% -10%,rgba(255,215,0,.05),transparent 60%)":"radial-gradient(circle at 50% -10%,rgba(255,215,0,.07),transparent 60%)"}}/>
        <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:15,textAlign:"center",marginBottom:20,color:"#f59e0b",position:"relative",letterSpacing:".5px"}}>🏆 TOP 3 PODIUM — LAST 15 SCHOOL DAYS</div>
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"center",gap:12,position:"relative"}}>
          {podOrder.map(idx=>{
            const s=top3[idx];if(!s)return <div key={idx} style={{width:155}}/>;
            const c=podClr[s.rank-1];
            return <div key={s.id} style={{display:"flex",flexDirection:"column",alignItems:"center",width:162}}>
              {s.rank===1&&<div style={{fontSize:28,animation:"float 2s ease-in-out infinite",marginBottom:4}}>👑</div>}
              <Av name={s.name} size={s.rank===1?64:50}/>
              <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:13,marginTop:7,textAlign:"center",maxWidth:155}}>{s.name}</div>
              <div style={{fontSize:11,color:muted,marginTop:1}}>{s.roll} · {s.cls}</div>
              <div style={{fontSize:10,fontWeight:700,color:s.batch==="Batch 1"?"#00f5c3":"#38bdf8",marginTop:2}}>{s.batch}</div>
              <div style={{fontSize:s.rank===1?28:22,fontWeight:800,color:c,fontFamily:"Syne,sans-serif",marginTop:5,lineHeight:1}}>{s.d15.pct}%</div>
              <div style={{fontSize:11,color:muted,marginTop:1}}>{s.d15.present}/{s.d15.total} days present</div>
              <div style={{fontSize:11,fontWeight:700,color:c,marginTop:1}}>{s.score} pts</div>
              {/* 15-day mini calendar strip */}
              <div style={{display:"flex",gap:2,marginTop:8,marginBottom:0,flexWrap:"wrap",justifyContent:"center",maxWidth:154}}>
                {last15Dates.map(dt=>{
                  const rec=log.filter(r=>r.studentId===s.id&&r.date===dt&&r.present);
                  const absent=log.filter(r=>r.studentId===s.id&&r.date===dt&&!r.present);
                  const col=rec.length>0?"#00f5c3":absent.length>0?"#ff4d6d":dark?"#1e293b":"#e2e8f0";
                  return <div key={dt} title={dt} style={{width:8,height:8,borderRadius:2,background:col,transition:"transform .15s",cursor:"default"}}/>;
                })}
              </div>
              <div style={{fontSize:9,color:dark?"#1e3a5f":"#cbd5e1",marginBottom:0}}>last 15 days ●=present ●=absent</div>
              <div style={{marginTop:10,width:"100%",height:podH[s.rank-1],background:`linear-gradient(180deg,${c}18,${c}06)`,border:`2px solid ${c}40`,borderBottom:"none",borderRadius:"12px 12px 0 0",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",top:0,left:"-100%",width:"60%",height:"100%",background:"linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent)",animation:"shine 2.5s ease-in-out infinite"}}/>
                <span style={{fontFamily:"Syne,sans-serif",fontSize:38,fontWeight:800,color:c,opacity:.18}}>#{s.rank}</span>
              </div>
            </div>;})}
        </div>
      </div>}

      {/* FULL RANKINGS TABLE */}
      <div style={{background:cardBg,border:`1px solid ${brd}`,borderRadius:14,overflow:"hidden",boxShadow:dark?"none":"0 1px 8px rgba(0,0,0,.05)"}}>
        <div style={{padding:"14px 18px",borderBottom:`1px solid ${brd}`,fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span>📊 Full Rankings — Last 15 School Days</span>
          <span style={{fontSize:11,color:muted}}>Score = (days present × 10) + attendance %</span>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:860}}>
            <thead><tr>{["Rank","Student","Batch","Class","15-Day Calendar","Days Present","15-Day %","Overall %","Score","Status"].map(h=><TH key={h} ch={h}/>)}</tr></thead>
            <tbody>{ranked.map(s=>{
              const bc=s.batch==="Batch 1"?"#00f5c3":"#38bdf8";
              const rc=s.rank===1?"#ffd700":s.rank===2?"#c0c0c0":s.rank===3?"#cd7f32":muted;
              const isTop=s.rank<=3;
              return <tr key={s.id} style={{borderTop:`1px solid ${dark?"#0a1120":"#f1f5f9"}`,background:isTop?(dark?"rgba(255,215,0,.022)":"rgba(255,215,0,.04)"):"transparent"}}>
                <TD ch={<div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:isTop?`${rc}20`:"rgba(128,128,128,.07)",border:`2px solid ${isTop?rc:"rgba(128,128,128,.18)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:13,color:rc,flexShrink:0,animation:s.rank===1?"rankPop .6s ease":undefined}}>
                    {s.rank<=3?medals[s.rank-1]:s.rank}
                  </div>
                </div>}/>
                <TD ch={<ACl name={s.name} sub={s.roll}/>}/>
                <TD ch={<span style={{display:"inline-flex",alignItems:"center",gap:4,background:`${bc}12`,border:`1px solid ${bc}30`,borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:700,color:bc}}><span style={{width:5,height:5,borderRadius:"50%",background:bc}}/>{s.batch}</span>}/>
                <TD ch={<span style={{background:"rgba(56,189,248,.1)",color:"#38bdf8",borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:600}}>{s.cls}</span>}/>
                <TD ch={<div style={{display:"flex",gap:2,flexWrap:"nowrap"}}>
                  {last15Dates.map(dt=>{
                    const rec=log.filter(r=>r.studentId===s.id&&r.date===dt&&r.present).length>0;
                    const abs=log.filter(r=>r.studentId===s.id&&r.date===dt&&!r.present).length>0;
                    return <div key={dt} title={dt} style={{width:7,height:14,borderRadius:2,background:rec?"#00f5c3":abs?"#ff4d6d":dark?"#1e293b":"#e2e8f0",flexShrink:0}}/>;
                  })}
                </div>}/>
                <TD ch={<span style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:18,color:pctCol(s.d15.pct)}}>{s.d15.present}</span>}/>
                <TD ch={<div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:64,height:5,background:"rgba(128,128,128,.15)",borderRadius:10,overflow:"hidden"}}><div style={{width:`${s.d15.pct}%`,height:"100%",background:pctCol(s.d15.pct),borderRadius:10}}/></div><span style={{fontSize:12,fontWeight:800,color:pctCol(s.d15.pct),minWidth:34}}>{s.d15.pct}%</span></div>}/>
                <TD ch={<Prg p={s.overall}/>}/>
                <TD ch={<span style={{fontFamily:"Syne,sans-serif",fontWeight:800,color:isTop?rc:"#00f5c3",fontSize:14}}>{s.score}</span>}/>
                <TD ch={<div style={{display:"flex",gap:4,alignItems:"center"}}><Bdg {...pctBdg(s.d15.pct)}/>{s.rank===1&&<span title="Leader">👑</span>}{s.d15.pct===100&&<span title="Perfect">⭐</span>}</div>}/>
              </tr>;})}
            </tbody>
          </table>
          {ranked.length===0&&<Emp ico="🔍" txt="No students match current filters."/>}
        </div>
      </div>
    </>}

    {/* ═══ CLASS-WISE RANKINGS VIEW ═══ */}
    {view==="byclass"&&<div>
      <div style={{background:dark?"rgba(0,245,195,.04)":"rgba(8,145,178,.04)",border:`1px solid ${dark?"rgba(0,245,195,.15)":"rgba(8,145,178,.15)"}`,borderRadius:11,padding:"11px 16px",marginBottom:18,fontSize:13,color:dark?"#00f5c3":"#0891b2",display:"flex",alignItems:"center",gap:9}}>
        <span style={{fontSize:16}}>ℹ️</span>
        <span>Class rankings show each student's rank <b>within their own class</b> based on last 15 days. Rank 1 = top student in that class.</span>
      </div>
      {classes.map(cls=>{
        const clsStudents=classRanked[cls]?.filter(s=>(fb==="All"||s.batch===fb));
        if(!clsStudents||!clsStudents.length) return null;
        const clsTop=clsStudents[0];
        return <div key={cls} style={{background:cardBg,border:`1px solid ${brd}`,borderRadius:14,overflow:"hidden",marginBottom:16,boxShadow:dark?"none":"0 1px 8px rgba(0,0,0,.05)"}}>
          {/* CLASS HEADER */}
          <div style={{padding:"12px 18px",borderBottom:`1px solid ${brd}`,background:dark?"linear-gradient(135deg,rgba(56,189,248,.06),rgba(0,245,195,.03))":"linear-gradient(135deg,rgba(56,189,248,.06),rgba(8,145,178,.04))",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#38bdf8,#00f5c3)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:14,color:"#000"}}>{cls}</div>
              <div>
                <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:15}}>Class {cls}</div>
                <div style={{fontSize:11,color:muted}}>{clsStudents.length} students · Ranked by last 15 days</div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {clsTop&&<div style={{textAlign:"right"}}>
                <div style={{fontSize:10,color:muted}}>Class Topper</div>
                <div style={{fontWeight:700,fontSize:13,color:"#ffd700"}}>👑 {clsTop.name.split(" ")[0]}</div>
                <div style={{fontSize:11,color:"#ffd700"}}>{clsTop.d15.pct}%</div>
              </div>}
            </div>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
              <thead><tr>{["Class Rank","Student","Batch","15-Day Calendar","Days Present / Total","15-Day %","Overall %","Score"].map(h=><TH key={h} ch={h}/>)}</tr></thead>
              <tbody>{clsStudents.map(s=>{
                const rc=s.classRank===1?"#ffd700":s.classRank===2?"#c0c0c0":s.classRank===3?"#cd7f32":muted;
                const isTop=s.classRank<=3;
                const bc=s.batch==="Batch 1"?"#00f5c3":"#38bdf8";
                return <tr key={s.id} style={{borderTop:`1px solid ${dark?"#0a1120":"#f1f5f9"}`,background:isTop?(dark?"rgba(255,215,0,.02)":"rgba(255,215,0,.04)"):"transparent"}}>
                  <TD ch={<div style={{display:"flex",alignItems:"center",gap:7}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:isTop?`${rc}20`:"rgba(128,128,128,.07)",border:`2px solid ${isTop?rc:"rgba(128,128,128,.18)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:12,color:rc,flexShrink:0}}>
                      {s.classRank<=3?medals[s.classRank-1]:s.classRank}
                    </div>
                    <span style={{fontSize:10,color:muted}}>/ {s.classTotalStudents}</span>
                  </div>}/>
                  <TD ch={<ACl name={s.name} sub={s.roll}/>}/>
                  <TD ch={<span style={{display:"inline-flex",alignItems:"center",gap:4,background:`${bc}12`,border:`1px solid ${bc}30`,borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:700,color:bc}}><span style={{width:5,height:5,borderRadius:"50%",background:bc}}/>{s.batch}</span>}/>
                  <TD ch={<div style={{display:"flex",gap:2,flexWrap:"nowrap"}}>
                    {last15Dates.map(dt=>{
                      const rec=log.filter(r=>r.studentId===s.id&&r.date===dt&&r.present).length>0;
                      const abs=log.filter(r=>r.studentId===s.id&&r.date===dt&&!r.present).length>0;
                      return <div key={dt} title={dt} style={{width:8,height:16,borderRadius:2,background:rec?"#00f5c3":abs?"#ff4d6d":dark?"#1e293b":"#e2e8f0",flexShrink:0}}/>;
                    })}
                  </div>}/>
                  <TD ch={<div style={{display:"flex",alignItems:"center",gap:4}}>
                    <span style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:17,color:pctCol(s.d15.pct)}}>{s.d15.present}</span>
                    <span style={{color:muted,fontSize:12}}>/ {s.d15.total}</span>
                  </div>}/>
                  <TD ch={<div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:60,height:5,background:"rgba(128,128,128,.15)",borderRadius:10,overflow:"hidden"}}><div style={{width:`${s.d15.pct}%`,height:"100%",background:pctCol(s.d15.pct),borderRadius:10}}/></div><span style={{fontSize:12,fontWeight:800,color:pctCol(s.d15.pct),minWidth:34}}>{s.d15.pct}%</span></div>}/>
                  <TD ch={<Prg p={s.overall}/>}/>
                  <TD ch={<span style={{fontFamily:"Syne,sans-serif",fontWeight:800,color:isTop?rc:"#00f5c3",fontSize:13}}>{s.score}</span>}/>
                </tr>;})}
              </tbody>
            </table>
          </div>
        </div>;
      })}
    </div>}

    {/* LEGEND */}
    <div style={{display:"flex",gap:14,fontSize:11,color:muted,flexWrap:"wrap",marginTop:8,padding:"10px 0",borderTop:`1px solid ${brd}`}}>
      <span>🥇 Gold — Rank 1</span><span>🥈 Silver — Rank 2</span><span>🥉 Bronze — Rank 3</span>
      <span>⭐ Perfect 15-day attendance</span><span>👑 Class/Overall leader</span>

      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:2,background:"#ff4d6d",display:"inline-block"}}/>Absent</span>
      <span style={{marginLeft:"auto"}}>Score = (days present × 10) + attendance%</span>
    </div>
  </div>;}

  const btnG={background:"transparent",color:muted,border:`1px solid ${dark?"#1e293b":"#e2e8f0"}`,padding:"8px 13px",borderRadius:9,cursor:"pointer",fontSize:13,fontWeight:600};
  const btnS={background:"transparent",color:muted,border:`1px solid ${dark?"#1e293b":"#e2e8f0"}`,padding:"5px 9px",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:600};

  function saveAtt(){
    if(!markSub){showToast("Select a subject!","error");return;}
    const ents=Object.entries(markSt);if(!ents.length){showToast("Mark some attendance!","error");return;}
    const dt=todayStr();
    const nl=log.filter(r=>!(r.date===dt&&r.subjectId===parseInt(markSub)));
    ents.forEach(([sid,present])=>nl.push({date:dt,studentId:parseInt(sid),subjectId:parseInt(markSub),present,method:"manual"}));
    setLog(nl);let an=0;const na={...alerts2};
    ents.forEach(([sid])=>{const st=students.find(s=>s.id==sid);if(calcOverall(parseInt(sid),st?.subjects||[],nl)<75&&!alerts2[sid]){na[sid]={status:"pending",date:dt};an++;}});
    if(an){setAlerts2(na);showToast(`⚠️ ${an} alert(s) queued!`,"warn");}
    showToast(`✅ Saved for ${ents.length} students!`,"success");setMarkSt({});}

  async function sendAlertF(studentId){
    const st=students.find(s=>s.id===studentId);const pct=calcOverall(st.id,st.subjects,log);
    const bd=st.subjects.map(sid=>{const sub=SUBJECTS.find(s=>s.id===sid);const att=calcSub(st.id,sid,log);return{name:sub?.name||"—",code:sub?.code||"—",...att};});
    setAiLoad(p=>({...p,[studentId]:true}));
    const r=await apiGmail(st,pct,bd);
    setAiLoad(p=>({...p,[studentId]:false}));
    setAlerts2(p=>({...p,[studentId]:{status:"sent",date:todayStr(),sim:r.sim}}));
    showToast(r.sim?`📧 Alert drafted for ${st.parentEmail}`:`📧 Sent to ${st.parentEmail}!`,"success");}
  async function sendAll(){const p=low.filter(s=>!alerts2[s.id]||alerts2[s.id].status!=="sent");if(!p.length){showToast("No pending!","info");return;}for(const s of p)await sendAlertF(s.id);}

        </div>

          <tbody>{s.subjects.map(sid=>{const sub=SUBJECTS.find(x=>x.id===sid);const att=calcSub(s.id,sid,log);return <tr key={sid} style={{borderTop:`1px solid ${dark?"#0a1120":"#f1f5f9"}`}}>

            <TD ch={<b style={{color:"#00f5c3"}}>{sub?.total}</b>}/><TD ch={att.held}/><TD ch={att.attended}/>
            <TD ch={<Prg p={att.pct}/>}/><TD ch={<Bdg {...pctBdg(att.pct)}/>}/>
          </tr>;})}
          </tbody>
        </table>
      </div>)});}

  const filtStu=students.filter(s=>{
    const q=search.toLowerCase();
    const mq=s.name.toLowerCase().includes(q)||s.roll.toLowerCase().includes(q);
    const mb=batchF==="All"||s.batch===batchF;
    const mbr=branchF==="All"||s.branch===branchF;
    return mq&&mb&&mbr;});

  const NAVS=[
    {id:"dashboard",ico:"⬡",label:"Dashboard"},

  return <div style={{display:"flex",minHeight:"100vh",background:bg,color:txt,fontFamily:"'DM Sans',sans-serif"}}>

        setLog(prev=>{const n=prev.filter(r=>!(r.date===dt&&r.studentId===scanner.student.id&&r.subjectId===scanner.subjectId));return[...n,{date:dt,studentId:scanner.student.id,subjectId:scanner.subjectId,present:true,method:"face_scan"}];});

                    return <tr key={s.id} style={{borderTop:`1px solid ${dark?"#0a1120":"#f1f5f9"}`}}>
                      <TD ch={<span style={{color:muted,fontSize:12}}>{i+1}</span>}/>
                      <TD ch={<span style={{background:`${b.color}12`,color:b.color,borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:700,fontFamily:"monospace",border:`1px solid ${b.color}25`}}>{s.code}</span>}/>
                      <TD ch={<span style={{background:`${tc}15`,color:tc,borderRadius:6,padding:"2px 7px",fontSize:11,fontWeight:700}}>{s.type}</span>}/>
                      <TD ch={<span style={{fontWeight:600,fontSize:13}}>{s.name}</span>}/>
                      <TD ch={<b style={{color:"#38bdf8"}}>{s.L}</b>}/><TD ch={<b style={{color:"#a78bfa"}}>{s.T}</b>}/><TD ch={<b style={{color:"#f59e0b"}}>{s.P}</b>}/>
                      <TD ch={<b style={{color:b.color,fontFamily:"Syne,sans-serif",fontSize:16}}>{s.total}</b>}/>
                      <TD ch={<div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:50,height:4,background:"rgba(128,128,128,.15)",borderRadius:10,overflow:"hidden"}}><div style={{width:`${Math.min(100,(en/Math.max(students.length,1))*100)}%`,height:"100%",background:b.color,borderRadius:10}}/></div><span style={{fontSize:12,fontWeight:700,color:b.color}}>{en}</span></div>}/>
                    </tr>;})}
                  </tbody>
                  <tfoot><tr style={{borderTop:`1px solid ${dark?"#1e293b":"#e2e8f0"}`}}>
                    <td colSpan={4} style={{padding:"9px 14px",fontSize:12,color:muted,fontStyle:"italic"}}>Subtotal</td>
                    <td style={{padding:"9px 14px",fontWeight:800,color:"#38bdf8"}}>{totalL}</td>
                    <td style={{padding:"9px 14px",fontWeight:800,color:"#a78bfa"}}>{totalT}</td>
                    <td style={{padding:"9px 14px",fontWeight:800,color:"#f59e0b"}}>{totalP}</td>
                    <td style={{padding:"9px 14px",fontWeight:800,color:b.color,fontFamily:"Syne,sans-serif",fontSize:15}}>{totalCr}</td>
                    <td style={{padding:"9px 14px"}}/>
                  </tr></tfoot>
                </table>
              </div>
            </Crd>
          </div>;})}
      </div>}

      {/* REPORTS */}
      {page==="reports"&&<div style={{animation:"fadeUp .3s ease"}}>
        <div style={{marginBottom:14}}><div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:26}}>Attendance Reports</div><div style={{fontSize:13,color:muted,marginTop:3}}>All branches · sorted by lowest attendance first</div></div>
        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
          <select style={{...inp2,minWidth:150}} onChange={e=>setBranchF(e.target.value)} value={branchF}>
            <option value="All">All Branches</option>{BRANCHES.map(b=><option key={b.id} value={b.id}>{b.label}</option>)}
          </select>
          <select style={{...inp2,minWidth:120}} value={batchF} onChange={e=>setBatchF(e.target.value)}>
            <option value="All">All Batches</option><option value="Batch 1">Batch 1</option><option value="Batch 2">Batch 2</option>
          </select>
          <span style={{fontSize:12,color:muted,marginLeft:4}}>Showing {students.filter(s=>(branchF==="All"||s.branch===branchF)&&(batchF==="All"||s.batch===batchF)).flatMap(s=>s.subjects).length} records</span>
        </div>
        <Crd>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:900}}>
              <thead><tr>{["Student","Branch","Batch","Subject","Code","Type","Held","Attended","Attendance","Method","Status"].map(h=><TH key={h} ch={h}/>)}</tr></thead>
              <tbody>{students
                .filter(s=>(branchF==="All"||s.branch===branchF)&&(batchF==="All"||s.batch===batchF))
                .flatMap(st=>st.subjects.map(sid=>{
                  const sub=SUBJECTS.find(s=>s.id===sid);const att=calcSub(st.id,sid,log);
                  const fN=log.filter(r=>r.studentId===st.id&&r.subjectId===sid&&r.method==="face_scan").length;
                  return{st,sub,att,fN};}))
                .sort((a,b)=>a.att.pct-b.att.pct)
                .map(({st,sub,att,fN},i)=>{
                  const bc=st.batch==="Batch 1"?"#00f5c3":"#38bdf8";
                  const brInfo=BRANCHES.find(b=>b.id===st.branch);const brC=brInfo?.color||"#94a3b8";
                  return <tr key={i} style={{borderTop:`1px solid ${dark?"#0a1120":"#f1f5f9"}`}}>
                    <TD ch={<ACl name={st.name} sub={st.roll}/>}/>
                    <TD ch={<span style={{display:"inline-flex",alignItems:"center",gap:4,background:`${brC}12`,border:`1px solid ${brC}25`,borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700,color:brC,whiteSpace:"nowrap"}}><span style={{width:5,height:5,borderRadius:"50%",background:brC}}/>{brInfo?.label||"—"}</span>}/>
                    <TD ch={<span style={{display:"inline-flex",alignItems:"center",gap:4,background:`${bc}10`,border:`1px solid ${bc}30`,borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700,color:bc}}><span style={{width:4,height:4,borderRadius:"50%",background:bc}}/>{st.batch}</span>}/>
                    <TD ch={sub?.name}/><TD ch={<span style={{background:"rgba(56,189,248,.1)",color:"#38bdf8",borderRadius:20,padding:"2px 8px",fontSize:10,fontFamily:"monospace"}}>{sub?.code}</span>}/>
                    <TD ch={<span style={{background:`${TC[sub?.type]||"#fff"}15`,color:TC[sub?.type]||"#fff",borderRadius:5,padding:"2px 6px",fontSize:11,fontWeight:700}}>{sub?.type}</span>}/>
                    <TD ch={att.held}/><TD ch={att.attended}/><TD ch={<Prg p={att.pct}/>}/>
                    <TD ch={fN>0?<span style={{background:"rgba(0,245,195,.1)",color:"#00f5c3",border:"1px solid rgba(0,245,195,.2)",borderRadius:20,padding:"2px 8px",fontSize:11}}>🔬 {fN}</span>:<span style={{background:"rgba(167,139,250,.08)",color:"#a78bfa",borderRadius:20,padding:"2px 8px",fontSize:11}}>Manual</span>}/>
                    <TD ch={<Bdg {...pctBdg(att.pct)}/>}/>
                  </tr>;})
              }</tbody>
            </table>
          </div>
        </Crd>
      </div>}

      {/* ALERTS */}
      {page==="alerts"&&<div style={{animation:"fadeUp .3s ease"}}>
        <div style={{marginBottom:18}}><div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:26}}>Parent Alerts</div><div style={{fontSize:13,color:muted,marginTop:3}}>Gmail-powered alerts for students below 75%</div></div>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}><button style={{...btnA,background:"rgba(255,77,109,.1)",color:"#ff4d6d",border:"1px solid rgba(255,77,109,.3)"}} onClick={sendAll}>📧 Send All Pending</button></div>
        {!low.length?<Emp ico="✅" txt="All students above 75% — no alerts needed!"/>:
        low.map(s=>{const p=calcOverall(s.id,s.subjects,log);const ai=alerts2[s.id];const ld=aiLoad[s.id];const bc=s.batch==="Batch 1"?"#00f5c3":"#38bdf8";
        return <div key={s.id} style={{background:cardBg,border:"1px solid rgba(255,77,109,.12)",borderRadius:12,padding:"14px 18px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:14}}>
          <div style={{display:"flex",gap:12,flex:1}}>
            <Av name={s.name} size={44}/>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{s.name} <span style={{color:muted,fontSize:12,fontWeight:400}}>{s.roll} · {s.cls}</span>
                <span style={{marginLeft:8,display:"inline-flex",alignItems:"center",gap:4,background:`${bc}10`,border:`1px solid ${bc}30`,borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700,color:bc}}><span style={{width:5,height:5,borderRadius:"50%",background:bc}}/>{s.batch}</span>
                {(()=>{const brInfo=BRANCHES.find(b=>b.id===s.branch);const brC=brInfo?.color||"#94a3b8";return brInfo?<span style={{marginLeft:4,display:"inline-flex",alignItems:"center",gap:4,background:`${brC}10`,border:`1px solid ${brC}25`,borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700,color:brC}}><span style={{width:5,height:5,borderRadius:"50%",background:brC}}/>{brInfo.label}</span>:null;})()}
              </div>
              <div style={{fontSize:12,color:muted,marginTop:3}}>Overall: <b style={{color:pctCol(p)}}>{p}%</b> · To: <b>{s.parentEmail}</b></div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>
                {s.subjects.map(sid=>{const sub=SUBJECTS.find(x=>x.id===sid);const att=calcSub(s.id,sid,log);return att.pct<75?<span key={sid} style={{background:"rgba(255,77,109,.08)",color:"#ff4d6d",border:"1px solid rgba(255,77,109,.2)",borderRadius:20,padding:"2px 8px",fontSize:11}}>{sub?.code}: {att.pct}%</span>:null;})}
              </div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
            {ai?.status==="sent"
              ?<div style={{color:"#00f5c3",fontSize:12,fontWeight:700,textAlign:"right"}}>✓ {ai.sim?"Drafted":"Sent"}<br/><span style={{fontSize:11,color:muted}}>{ai.date}</span></div>
              :<button style={{background:"rgba(255,77,109,.1)",border:"1px solid rgba(255,77,109,.3)",color:"#ff4d6d",padding:"7px 14px",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700}} onClick={()=>sendAlertF(s.id)} disabled={ld}>{ld?"Sending…":"📧 Send Alert"}</button>}
          </div>
        </div>;})}
        <div style={{display:"flex",gap:10,alignItems:"center",background:"rgba(0,245,195,.03)",border:"1px solid rgba(0,245,195,.1)",borderRadius:9,padding:"11px 15px",fontSize:12,color:muted,marginTop:14}}>
          🔗 Gmail MCP active — connect Gmail in Claude.ai settings for live email delivery.
        </div>
      </div>}

    </main>
  </div>;
}

        <div style={{position:"absolute",left:"50%",top:"50%",transform:"translate(-50%,-50%)",width:"60%",height:"200%",background:dark?"radial-gradient(ellipse,rgba(0,245,195,.04),transparent 60%)":"radial-gradient(ellipse,rgba(8,145,178,.05),transparent 60%)",pointerEvents:"none"}}/>
        <div style={{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#00f5c3,#38bdf8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,boxShadow:dark?"0 0 20px rgba(0,245,195,.25)":"0 0 16px rgba(8,145,178,.2)",position:"relative"}}>🎓</div>
        <div style={{textAlign:"center",position:"relative"}}>
          <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:"clamp(13px,2vw,20px)",letterSpacing:"2.5px",textTransform:"uppercase",background:dark?"linear-gradient(135deg,#00f5c3,#38bdf8)":"linear-gradient(135deg,#0891b2,#0e7490)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1.15}}>MIT VISHWAPRAYAG</div>
          <div style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:"clamp(9px,1.2vw,13px)",letterSpacing:"4px",textTransform:"uppercase",color:dark?"rgba(0,245,195,.55)":"rgba(8,145,178,.6)",marginTop:1}}>SMART ATTENDANCE SYSTEM</div>
        </div>
        {/* DARK / LIGHT TOGGLE */}
        <div style={{position:"absolute",right:16,top:"50%",transform:"translateY(-50%)"}}>
          <div onClick={()=>setDark(d=>!d)} title={dark?"Switch to Light Mode":"Switch to Dark Mode"}
            style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"7px 14px",borderRadius:22,background:dark?"rgba(0,245,195,.09)":"rgba(8,145,178,.09)",border:`1.5px solid ${dark?"rgba(0,245,195,.35)":"rgba(8,145,178,.35)"}`,transition:"all .25s",userSelect:"none",boxShadow:dark?"0 0 12px rgba(0,245,195,.1)":"0 0 12px rgba(8,145,178,.1)"}}>
            <span style={{fontSize:15,lineHeight:1}}>{dark?"🌙":"☀️"}</span>
            <div style={{width:38,height:20,borderRadius:11,background:dark?"rgba(0,245,195,.18)":"rgba(8,145,178,.18)",border:`1px solid ${dark?"rgba(0,245,195,.4)":"rgba(8,145,178,.4)"}`,position:"relative",transition:"all .3s",flexShrink:0}}>
              <div style={{position:"absolute",top:2,left:dark?20:2,width:14,height:14,borderRadius:"50%",background:dark?"#00f5c3":"#0891b2",transition:"left .3s",boxShadow:"0 1px 5px rgba(0,0,0,.35)"}}/>
            </div>
            <span style={{fontSize:11,fontWeight:700,color:dark?"#00f5c3":"#0891b2",letterSpacing:".3px"}}>{dark?"Dark":"Light"}</span>

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
